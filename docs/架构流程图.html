<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RambosPlayer 整体架构流程图</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #cbd5e1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 6px 40px rgba(0,0,0,0.12);
    max-width: 1260px;
    width: 100%;
    overflow-x: auto;
  }
  svg { width: 100%; height: auto; display: block; min-width: 1100px; }
</style>
</head>
<body>
<div class="card">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
<style>
  text { font-family: "Microsoft YaHei","PingFang SC","Helvetica Neue",sans-serif; }
</style>
<defs>
  <marker id="ma" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
  </marker>
  <marker id="mo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/>
  </marker>
  <marker id="mg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#10b981"/>
  </marker>
  <linearGradient id="gUI" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
  </linearGradient>
  <linearGradient id="gCtrl" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
  </linearGradient>
  <linearGradient id="gDemux" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/>
  </linearGradient>
  <linearGradient id="gVid" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/>
  </linearGradient>
  <linearGradient id="gAud" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/>
  </linearGradient>
  <linearGradient id="gSync" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#db2777"/>
  </linearGradient>
  <linearGradient id="gOther" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#64748b"/><stop offset="100%" stop-color="#475569"/>
  </linearGradient>
  <filter id="sh" x="-2%" y="-2%" width="106%" height="114%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
  </filter>
</defs>

<!-- 背景 -->
<rect width="1200" height="900" fill="#f8fafc" rx="4"/>

<!-- 标题 -->
<text x="600" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">
  RambosPlayer 整体架构流程图
</text>
<text x="600" y="52" text-anchor="middle" font-size="11" fill="#94a3b8">
  多线程播放器 — 解复用 → 解码 → 滤镜 → 渲染 — 音频时钟同步 · 推流 · 剪辑
</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 1. UI 交互层 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<rect x="80" y="68" width="1040" height="56" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2" filter="url(#sh)"/>
<rect x="81" y="69" width="1038" height="24" rx="9" fill="url(#gUI)"/>
<text x="600" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="white">UI 交互层</text>
<text x="210" y="112" font-size="10" fill="#475569">播放 / 暂停 · 进度条点击跳转 · 方向键快进快退</text>
<text x="620" y="112" font-size="10" fill="#475569">音量滑块 · 双击全屏 · 菜单栏（文件/滤镜/推流/剪辑）</text>

<!-- 箭头 UI → Ctrl -->
<line x1="600" y1="124" x2="600" y2="148" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ma)"/>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 2. 播放控制器 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<rect x="280" y="152" width="640" height="52" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
<rect x="281" y="153" width="638" height="22" rx="9" fill="url(#gCtrl)"/>
<text x="600" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="white">播放控制器</text>
<text x="600" y="194" text-anchor="middle" font-size="10" fill="#475569">
  统一调度组件生命周期：打开文件 → 启动/暂停/停止/跳转 → 音量调节
</text>

<!-- 箭头 Ctrl → Demux -->
<line x1="600" y1="204" x2="600" y2="228" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#ma)"/>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 3. 解复用模块 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<rect x="280" y="232" width="640" height="60" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
<rect x="281" y="233" width="638" height="22" rx="9" fill="url(#gDemux)"/>
<text x="600" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="white">解复用模块</text>
<text x="600" y="272" text-anchor="middle" font-size="10" fill="#475569">
  读取视频文件 → 解析容器格式（mp4/mkv/avi/flv） → 按流索引分离视频包 / 音频包
</text>
<text x="600" y="286" text-anchor="middle" font-size="9" fill="#94a3b8">
  视频包队列（容量 100） · 音频包队列（容量 400）
</text>

<!-- 分支箭头 -->
<line x1="460" y1="292" x2="360" y2="340" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#ma)"/>
<line x1="740" y1="292" x2="840" y2="340" stroke="#10b981" stroke-width="2.5" marker-end="url(#ma)"/>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 4a. 视频解码 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<rect x="120" y="344" width="480" height="72" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
<rect x="121" y="345" width="478" height="22" rx="9" fill="url(#gVid)"/>
<text x="360" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="white">视频解码模块</text>
<text x="360" y="382" text-anchor="middle" font-size="10" fill="#475569">
  消费视频包队列 → H.264 / H.265 解码 → 输出视频帧
</text>
<text x="360" y="400" text-anchor="middle" font-size="9.5" fill="#d97706">
  硬件加速：D3D11VA 解码 → HW 帧转 SW 帧（NV12 格式）
</text>

<!-- 4b. 音频解码 -->
<rect x="600" y="344" width="480" height="72" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
<rect x="601" y="345" width="478" height="22" rx="9" fill="url(#gAud)"/>
<text x="840" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="white">音频解码模块</text>
<text x="840" y="382" text-anchor="middle" font-size="10" fill="#475569">
  消费音频包队列 → AAC / MP3 解码 → 重采样输出
</text>
<text x="840" y="400" text-anchor="middle" font-size="9.5" fill="#059669">
  重采样：任意采样率 → S16 立体声 44100Hz · 创建音频输出设备
</text>

<!-- 箭头视频 → 滤镜 -->
<line x1="360" y1="416" x2="360" y2="448" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#ma)"/>
<!-- 箭头音频 → 输出 -->
<line x1="840" y1="416" x2="840" y2="448" stroke="#10b981" stroke-width="2.5" marker-end="url(#ma)"/>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 5a. 视频滤镜 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<rect x="120" y="452" width="480" height="64" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="6,3" filter="url(#sh)"/>
<text x="360" y="476" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">视频滤镜模块（可选）</text>
<text x="360" y="496" text-anchor="middle" font-size="10" fill="#64748b">
  亮度调节 · 对比度调节 · 饱和度调节 · 水印叠加
</text>
<text x="360" y="510" text-anchor="middle" font-size="9" fill="#94a3b8">
  参数实时生效，无需重启播放 · FFmpeg libavfilter 滤镜链
</text>

<!-- 5b. 音频输出 -->
<rect x="600" y="452" width="480" height="64" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2" filter="url(#sh)"/>
<text x="840" y="476" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">音频输出模块</text>
<text x="840" y="496" text-anchor="middle" font-size="10" fill="#64748b">
  PCM 音频播放 · 音量调节 · 暂停/恢复
</text>
<text x="840" y="510" text-anchor="middle" font-size="9" fill="#94a3b8">
  根据实际播放量更新音频时钟（非解码位置，避免超前）
</text>

<!-- 箭头滤镜 → 渲染 -->
<line x1="360" y1="516" x2="360" y2="548" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#ma)"/>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 6. 视频渲染 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<rect x="180" y="552" width="360" height="56" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
<text x="360" y="574" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">视频渲染模块</text>
<text x="360" y="594" text-anchor="middle" font-size="10" fill="#475569">
  YUV420P → RGB32 颜色空间转换 · 画面绘制 · 1ms 定时刷新
</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 7. 音视频同步（横跨） -->
<!-- ═══════════════════════════════════════════════════════════ -->
<rect x="220" y="628" width="760" height="50" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="2" filter="url(#sh)"/>
<rect x="221" y="629" width="758" height="22" rx="9" fill="url(#gSync)"/>
<text x="600" y="644" text-anchor="middle" font-size="11" font-weight="700" fill="white">音视频同步机制</text>
<text x="600" y="668" text-anchor="middle" font-size="10" fill="#475569">
  音频时钟为主时钟 · 视频帧根据音频时钟计算延迟 → 领先则等待 / 落后超 400ms 则丢帧
</text>

<!-- 同步箭头：渲染 ← 时钟 -->
<line x1="600" y1="612" x2="600" y2="628" stroke="#ec4899" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ma)"/>

<!-- 从音频输出 → 同步（横线） -->
<line x1="840" y1="516" x2="840" y2="544" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="840" y1="544" x2="600" y2="544" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="600" y1="544" x2="600" y2="628" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ma)"/>

<text x="730" y="537" text-anchor="middle" font-size="9" fill="#ec4899">更新音频时钟</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 附属管线 -->
<!-- ═══════════════════════════════════════════════════════════ -->

<!-- 推流管线 -->
<rect x="60" y="708" width="540" height="90" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" filter="url(#sh)"/>
<rect x="61" y="709" width="538" height="20" rx="8" fill="url(#gOther)"/>
<text x="330" y="723" text-anchor="middle" font-size="10" font-weight="700" fill="white">推流管线</text>

<!-- 采集 → 编码 → 封装 三个小框 -->
<rect x="80" y="740" width="140" height="46" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="150" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">桌面 / 摄像头采集</text>
<text x="150" y="776" text-anchor="middle" font-size="8.5" fill="#64748b">gdigrab / dshow</text>

<text x="235" y="765" font-size="16" fill="#94a3b8">→</text>

<rect x="255" y="740" width="130" height="46" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
<text x="320" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">H.264 编码</text>
<text x="320" y="776" text-anchor="middle" font-size="8.5" fill="#64748b">YUV420P 编码</text>

<text x="400" y="765" font-size="16" fill="#94a3b8">→</text>

<rect x="420" y="740" width="160" height="46" rx="6" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
<text x="500" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">FLV 封装 / RTMP 推流</text>
<text x="500" y="776" text-anchor="middle" font-size="8.5" fill="#64748b">本地文件 / 远程服务器</text>

<!-- 视频剪辑 -->
<rect x="620" y="708" width="520" height="90" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" filter="url(#sh)"/>
<rect x="621" y="709" width="518" height="20" rx="8" fill="url(#gOther)"/>
<text x="880" y="723" text-anchor="middle" font-size="10" font-weight="700" fill="white">视频剪辑器</text>

<rect x="640" y="740" width="140" height="46" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
<text x="710" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#9d174d">时间轴选择</text>
<text x="710" y="776" text-anchor="middle" font-size="8.5" fill="#64748b">拖拽入点 / 出点</text>

<text x="795" y="765" font-size="16" fill="#94a3b8">→</text>

<rect x="815" y="740" width="140" height="46" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
<text x="885" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#6b21a8">缩略图预览</text>
<text x="885" y="776" text-anchor="middle" font-size="8.5" fill="#64748b">关键帧截图</text>

<text x="970" y="765" font-size="16" fill="#94a3b8">→</text>

<rect x="990" y="740" width="130" height="46" rx="6" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
<text x="1055" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">无损剪切导出</text>
<text x="1055" y="776" text-anchor="middle" font-size="8.5" fill="#64748b">关键帧裁剪</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 图例 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<rect x="60" y="818" width="1080" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
<rect x="80" y="828" width="12" height="12" rx="2" fill="#6366f1"/>
<text x="98" y="838" font-size="10" fill="#475569">UI 层</text>
<rect x="140" y="828" width="12" height="12" rx="2" fill="#3b82f6"/>
<text x="158" y="838" font-size="10" fill="#475569">解复用</text>
<rect x="210" y="828" width="12" height="12" rx="2" fill="#f59e0b"/>
<text x="228" y="838" font-size="10" fill="#475569">视频处理</text>
<rect x="285" y="828" width="12" height="12" rx="2" fill="#10b981"/>
<text x="303" y="838" font-size="10" fill="#475569">音频处理</text>
<rect x="360" y="828" width="12" height="12" rx="2" fill="#ec4899"/>
<text x="378" y="838" font-size="10" fill="#475569">同步机制</text>
<rect x="440" y="828" width="12" height="12" rx="2" fill="#64748b"/>
<text x="458" y="838" font-size="10" fill="#475569">附属管线</text>
<line x1="530" y1="834" x2="570" y2="834" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
<text x="578" y="838" font-size="10" fill="#475569">控制信号</text>
<line x1="660" y1="834" x2="700" y2="834" stroke="#3b82f6" stroke-width="2"/>
<text x="708" y="838" font-size="10" fill="#475569">数据流</text>
<rect x="770" y="828" width="12" height="12" rx="2" fill="#fff" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>
<text x="788" y="838" font-size="10" fill="#475569">可选模块</text>
</svg>
</div>
</body>
</html>
