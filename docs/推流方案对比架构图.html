<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>推流方案对比架构图</title>
<style>
body {
  margin: 0;
  background: #f1f5f9;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px;
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
}
svg {
  background: white;
  border-radius: 14px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  max-width: 100%;
}
</style>
</head>
<body>
<svg width="960" height="810" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="960" height="810" fill="#ffffff" rx="14"/>

  <!-- 列标题 -->
  <text x="220" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563eb">HTTP-FLV 方案</text>
  <text x="220" y="54" text-anchor="middle" font-size="12" fill="#64748b">无重编码 · 低延迟 · 低 CPU</text>
  <text x="740" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#d97706">HTTP-MPEG-TS 方案</text>
  <text x="740" y="54" text-anchor="middle" font-size="12" fill="#64748b">重编码 · 可控码率 · 容错性强</text>

  <!-- 中线分隔 -->
  <line x1="480" y1="20" x2="480" y2="790" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- DemuxThread 共用 -->
  <rect x="280" y="72" width="400" height="56" rx="10" fill="#1e293b"/>
  <text x="480" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="white">DemuxThread</text>
  <text x="480" y="116" text-anchor="middle" font-size="12" fill="#94a3b8">读取文件 · 解封装 · 分发压缩包</text>

  <!-- DemuxThread → 左分支 -->
  <polyline points="380,128 220,128 220,196" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arr-blue)"/>

  <!-- DemuxThread → 右分支 -->
  <polyline points="580,128 740,128 740,168" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#arr-amber)"/>

  <!-- 左: HttpFlvServer -->
  <rect x="60" y="196" width="320" height="80" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="220" y="224" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">HttpFlvServer</text>
  <text x="220" y="244" text-anchor="middle" font-size="12" fill="#1d4ed8">直接转发原始 AVPacket</text>
  <text x="220" y="262" text-anchor="middle" font-size="12" fill="#1e40af">port 8080</text>

  <!-- 右: StreamPipeline 外框（虚线） -->
  <rect x="570" y="168" width="340" height="200" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="740" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">StreamPipeline（重编码管线）</text>

  <!-- 右: StreamDecoder（管线内） -->
  <rect x="588" y="200" width="304" height="46" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="740" y="221" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">StreamDecoder</text>
  <text x="740" y="238" text-anchor="middle" font-size="11" fill="#78350f">视频 + 音频  解码为原始帧</text>

  <!-- 管线内箭头 -->
  <line x1="740" y1="246" x2="740" y2="260" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- 右: EncodeThread 对（管线内） -->
  <rect x="588" y="260" width="304" height="50" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="740" y="281" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">EncodeThread (libx264)</text>
  <text x="740" y="298" text-anchor="middle" font-size="11" fill="#78350f">AudioEncodeThread (AAC) · GOP 可控</text>

  <!-- StreamPipeline → MpegTsServer -->
  <line x1="740" y1="368" x2="740" y2="394" stroke="#d97706" stroke-width="2" marker-end="url(#arr-amber)"/>

  <!-- 右: MpegTsServer -->
  <rect x="570" y="394" width="340" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="740" y="422" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">MpegTsServer</text>
  <text x="740" y="442" text-anchor="middle" font-size="12" fill="#92400e">TS 打包 · late-join 缓冲（segmentBytes）</text>
  <text x="740" y="460" text-anchor="middle" font-size="12" fill="#92400e">port 8090</text>

  <!-- 左: HttpFlvServer → flv.js 长箭头 + HTTP 标签 -->
  <line x1="220" y1="276" x2="220" y2="528" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="138" y="378" width="164" height="28" rx="5" fill="white" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="220" y="397" text-anchor="middle" font-size="12" fill="#2563eb">HTTP 长连接</text>

  <!-- 右: MpegTsServer → mpegts.js 箭头 + HTTP 标签 -->
  <line x1="740" y1="474" x2="740" y2="528" stroke="#d97706" stroke-width="2" marker-end="url(#arr-amber)"/>
  <rect x="658" y="483" width="164" height="28" rx="5" fill="white" stroke="#fde68a" stroke-width="1.5"/>
  <text x="740" y="502" text-anchor="middle" font-size="12" fill="#d97706">HTTP 长连接</text>

  <!-- 左: flv.js -->
  <rect x="60" y="528" width="320" height="58" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="220" y="554" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">flv.js</text>
  <text x="220" y="573" text-anchor="middle" font-size="12" fill="#1d4ed8">浏览器端 MSE 解封装</text>

  <!-- 右: mpegts.js -->
  <rect x="570" y="528" width="340" height="58" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="740" y="554" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">mpegts.js</text>
  <text x="740" y="573" text-anchor="middle" font-size="12" fill="#92400e">浏览器端 MSE 解封装 + 追帧模式</text>

  <!-- flv.js / mpegts.js → 浏览器 -->
  <polyline points="220,586 220,642 370,660" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arr-blue)"/>
  <polyline points="740,586 740,642 590,660" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#arr-amber)"/>

  <!-- 浏览器 共用 -->
  <rect x="280" y="660" width="400" height="56" rx="10" fill="#1e293b"/>
  <text x="480" y="684" text-anchor="middle" font-size="14" font-weight="bold" fill="white">浏览器 Video 标签</text>
  <text x="480" y="703" text-anchor="middle" font-size="12" fill="#94a3b8">MSE 解码 → VideoDecoder → 渲染播放</text>

  <!-- 特性对比 -->
  <rect x="20" y="738" width="430" height="56" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="235" y="760" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">HTTP-FLV 特性</text>
  <text x="235" y="779" text-anchor="middle" font-size="11" fill="#1d4ed8">延迟 300–800ms · CPU 极低 · 无重编码 · 实现简单</text>

  <rect x="510" y="738" width="430" height="56" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="725" y="760" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">HTTP-MPEG-TS 特性</text>
  <text x="725" y="779" text-anchor="middle" font-size="11" fill="#92400e">延迟 400–1000ms · 可控码率+GOP · 容错强 · 兼容广</text>
</svg>
</body>
</html>
